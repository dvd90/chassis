name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, lint & test
        run: npm run verify

      - name: Build
        run: npm run build

  scaffold:
    # Scaffolds every project type and asserts each installs, verifies, and
    # ships only the files/deps its chosen modules need (no dead weight).
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20 # the supported floor — most likely to surface issues
          cache: npm

      - name: Scaffold integration test (structural + build)
        run: SCAFFOLD_BUILD=1 node --test cli/scaffold.test.mjs
